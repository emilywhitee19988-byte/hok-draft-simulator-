<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 HOK Draft Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(30, 41, 59, 0.8);
      border-radius: 15px;
      border: 2px solid #3b82f6;
    }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .draft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      background: rgba(30, 41, 59, 0.6);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #334155;
    }
    .panel h2 { color: #60a5fa; margin-bottom: 15px; }
    .role-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0; }
    .role-btn {
      padding: 12px 24px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 8px;
      color: #94a3b8;
      cursor: pointer;
      font-weight: 600;
    }
    .role-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    .hero-select {
      width: 100%;
      padding: 12px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      margin: 10px 0;
    }
    @media (max-width: 768px) {
      .draft-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    function getCounterSuggestions(role, enemyIds) {
      const roleHeroes = Object.values(HEROES).filter(h => h.role === role);
      
      const scored = roleHeroes.map(hero => {
        let score = 0;
        
        if (hero.counters) {
          Object.keys(hero.counters).forEach(lane => {
            const laneCounters = hero.counters[lane];
            if (laneCounters && laneCounters.strong) {
              laneCounters.strong.forEach(cid => {
                if (enemyIds.includes(cid)) score += 3;
              });
            }
          });
        }
        
        if (hero.tier === 'S') score += 2;
        if (hero.tier === 'A') score += 1;
        
        return { id: hero.id, score: score };
      });
      
      scored.sort((a, b) => b.score - a.score);
      return scored.filter(s => s.score > 0);
    }

    function calculateAvgTier(team) {
      const tierValues = { 'S': 1, 'A': 2, 'B': 3, 'C': 4 };
      const total = team.reduce((sum, h) => sum + (tierValues[h.tier] || 3), 0);
      return total / team.length;
    }

    function analyzeLaneMatchups() {
      const yourHeroSelect = document.querySelector('#your-hero-select select');
      const yourHeroId = yourHeroSelect ? yourHeroSelect.value : null;
      
      if (!yourHeroId) {
        document.getElementById('lane-matchups').style.display = 'none';
        return;
      }
      
      // Get all heroes
      const yourHero = HEROES[yourHeroId];
      const teammates = ['teammate1', 'teammate2', 'teammate3', 'teammate4']
        .map(id => document.getElementById(id).value)
        .map(id => id ? HEROES[id] : null)
        .filter(h => h);
      
      const enemies = ['enemy1', 'enemy2', 'enemy3', 'enemy4', 'enemy5']
        .map(id => document.getElementById(id).value)
        .map(id => id ? HEROES[id] : null)
        .filter(h => h);
      
      if (enemies.length < 3) {
        document.getElementById('lane-matchups').style.display = 'none';
        return;
      }
      
      document.getElementById('lane-matchups').style.display = 'block';
      
      // Assign lanes based on roles
      const yourTeam = [yourHero, ...teammates];
      const laneAssignments = assignLanes(yourTeam, enemies);
      
      // Analyze each matchup
      const matchups = [];
      const lanes = ['baron', 'mid', 'jungle', 'farm', 'support'];
      
      lanes.forEach(lane => {
        if (laneAssignments.your[lane] && laneAssignments.enemy[lane]) {
          const result = evaluateMatchup(
            laneAssignments.your[lane], 
            laneAssignments.enemy[lane],
            lane
          );
          matchups.push({
            lane: lane,
            yourHero: laneAssignments.your[lane],
            enemyHero: laneAssignments.enemy[lane],
            result: result
          });
        }
      });
      
      // Display results
      displayLaneMatchups(matchups);
    }
    
    function assignLanes(yourTeam, enemyTeam) {
      const assignments = {
        your: {},
        enemy: {}
      };
      
      // Simple lane assignment logic
      function assignTeam(team, side) {
        const assigned = {};
        
        // Mage → Mid
        const mage = team.find(h => h.role === 'Mage' && !assigned[h.id]);
        if (mage) { assignments[side].mid = mage; assigned[mage.id] = true; }
        
        // Marksman → Farm
        const marksman = team.find(h => h.role === 'Marksman' && !assigned[h.id]);
        if (marksman) { assignments[side].farm = marksman; assigned[marksman.id] = true; }
        
        // Assassin → Jungle (prefer) or Mid
        const assassin = team.find(h => h.role === 'Assassin' && !assigned[h.id]);
        if (assassin) { 
          if (!assignments[side].jungle) {
            assignments[side].jungle = assassin;
          } else if (!assignments[side].mid) {
            assignments[side].mid = assassin;
          }
          assigned[assassin.id] = true;
        }
        
        // Tank → Baron or Support
        const tank = team.find(h => h.role === 'Tank' && !assigned[h.id]);
        if (tank) {
          if (!assignments[side].baron) {
            assignments[side].baron = tank;
          } else {
            assignments[side].support = tank;
          }
          assigned[tank.id] = true;
        }
        
        // Fighter → Baron or Jungle
        const fighter = team.find(h => h.role === 'Fighter' && !assigned[h.id]);
        if (fighter) {
          if (!assignments[side].baron) {
            assignments[side].baron = fighter;
          } else if (!assignments[side].jungle) {
            assignments[side].jungle = fighter;
          }
          assigned[fighter.id] = true;
        }
        
        // Support → Support
        const support = team.find(h => h.role === 'Support' && !assigned[h.id]);
        if (support) { assignments[side].support = support; assigned[support.id] = true; }
        
        // Fill remaining
        team.forEach(h => {
          if (!assigned[h.id]) {
            if (!assignments[side].baron) assignments[side].baron = h;
            else if (!assignments[side].jungle) assignments[side].jungle = h;
            else if (!assignments[side].support) assignments[side].support = h;
          }
        });
      }
      
      assignTeam(yourTeam, 'your');
      assignTeam(enemyTeam, 'enemy');
      
      return assignments;
    }
    
    function evaluateMatchup(yourHero, enemyHero, lane) {
      let score = 0;  // Positive = you win, Negative = you lose
      
      // Check if you counter them
      if (yourHero.counters) {
        Object.keys(yourHero.counters).forEach(counterLane => {
          const laneCounters = yourHero.counters[counterLane];
          if (laneCounters && laneCounters.strong) {
            if (laneCounters.strong.includes(enemyHero.id)) {
              score += 3;  // Strong counter
            }
          }
        });
      }
      
      // Check if they counter you
      if (enemyHero.counters) {
        Object.keys(enemyHero.counters).forEach(counterLane => {
          const laneCounters = enemyHero.counters[counterLane];
          if (laneCounters && laneCounters.strong) {
            if (laneCounters.strong.includes(yourHero.id)) {
              score -= 3;  // They counter you
            }
          }
        });
      }
      
      // Tier advantage
      const tierValue = { 'S': 3, 'A': 2, 'B': 1, 'C': 0 };
      const yourTier = tierValue[yourHero.tier] || 1;
      const enemyTier = tierValue[enemyHero.tier] || 1;
      score += (yourTier - enemyTier);
      
      // Role matchups
      const roleMatchups = {
        'Tank': { 'Fighter': 1, 'Assassin': -1, 'Mage': -1 },
        'Fighter': { 'Marksman': 2, 'Mage': 1, 'Tank': -1 },
        'Assassin': { 'Mage': 2, 'Marksman': 2, 'Tank': -2 },
        'Mage': { 'Tank': 1, 'Fighter': -1, 'Assassin': -2 },
        'Marksman': { 'Tank': 1, 'Fighter': -2, 'Assassin': -2 },
        'Support': { 'Assassin': -1 }
      };
      
      if (roleMatchups[yourHero.role] && roleMatchups[yourHero.role][enemyHero.role]) {
        score += roleMatchups[yourHero.role][enemyHero.role];
      }
      
      // Determine result
      let verdict, advice;
      if (score >= 3) {
        verdict = 'favorable';
        advice = 'Play aggressive! You win this matchup. Push advantage early.';
      } else if (score >= 1) {
        verdict = 'slight_favor';
        advice = 'You have a slight edge. Trade carefully and look for kills.';
      } else if (score >= -1) {
        verdict = 'even';
        advice = 'Skill matchup. Focus on farming and avoid mistakes.';
      } else if (score >= -3) {
        verdict = 'slight_danger';
        advice = 'Difficult matchup. Play safe and wait for ganks.';
      } else {
        verdict = 'danger';
        advice = 'HARD COUNTER! Farm under tower. Ask for jungle help.';
      }
      
      return { verdict, advice, score };
    }

      const yourTeam = [yourHeroId, ...teammateIds].map(id => HEROES[id]).filter(h => h);
      
      // Calculate ban priorities
      const banCandidates = [];
      
      Object.values(HEROES).forEach(hero => {
        let banScore = 0;
        let reasons = [];
        
        // S-tier heroes are always ban-worthy
        if (hero.tier === 'S') {
          banScore += 5;
          reasons.push('S-tier meta pick - Always dangerous');
        } else if (hero.tier === 'A') {
          banScore += 2;
          reasons.push('A-tier strong pick');
        }
        
        // Check if hero counters anyone on your team
        let countersYourTeam = 0;
        yourTeam.forEach(ally => {
          if (hero.counters) {
            Object.keys(hero.counters).forEach(lane => {
              const laneCounters = hero.counters[lane];
              if (laneCounters && laneCounters.strong) {
                if (laneCounters.strong.includes(ally.id)) {
                  banScore += 4;
                  countersYourTeam++;
                }
              }
            });
          }
        });
        
        if (countersYourTeam > 0) {
          reasons.push(`Counters ${countersYourTeam} of your heroes`);
        }
        
        // Popular/annoying heroes
        const annoying = ['yao', 'guiguzi', 'jing', 'daji', 'lanlingwang', 'augran'];
        if (annoying.includes(hero.id)) {
          banScore += 3;
          reasons.push('High impact, hard to deal with');
        }
        
        // Protect your marksman from assassins
        const yourMarksmen = yourTeam.filter(h => h.role === 'Marksman');
        if (yourMarksmen.length > 0 && hero.role === 'Assassin' && hero.tier === 'S') {
          banScore += 3;
          reasons.push('Assassin that threatens your marksman');
        }
        
        // Protect your mage from dive
        const yourMages = yourTeam.filter(h => h.role === 'Mage');
        if (yourMages.length > 0 && (hero.role === 'Assassin' || hero.role === 'Fighter') && hero.tier === 'S') {
          banScore += 2;
          reasons.push('Dive threat to your mage');
        }
        
        if (banScore >= 2 && reasons.length > 0) {
          banCandidates.push({
            hero: hero,
            score: banScore,
            reasons: reasons
          });
        }
      });
      
      // Sort by score
      banCandidates.sort((a, b) => b.score - a.score);
      
      // Display top 5 bans (or show message if none)
      console.log('🚫 Ban candidates found:', banCandidates.length);
      if (banCandidates.length > 0) {
        displayBanRecommendations(banCandidates.slice(0, 5));

          .filter(h => h.tier === 'S')

          .map(h => ({
            hero: h,
            score: 5,
            reasons: ['S-tier meta pick - Always dangerous']
          }));
        displayBanRecommendations(genericBans);
      }
    }

    // TEAM SYNERGY ANALYSIS
    function analyzeTeamSynergy() {
      const yourHeroSelect = document.querySelector('#your-hero-select select');
      const yourHeroId = yourHeroSelect ? yourHeroSelect.value : null;
      
      if (!yourHeroId) {
        document.getElementById('team-synergy').style.display = 'none';
        return;
      }
      
      const teammateIds = ['teammate1', 'teammate2', 'teammate3', 'teammate4']
        .map(id => document.getElementById(id).value)
        .filter(v => v);
      
      if (teammateIds.length < 2) {
        document.getElementById('team-synergy').style.display = 'none';
        return;
      }
      
      document.getElementById('team-synergy').style.display = 'block';
      
      const yourTeam = [HEROES[yourHeroId], ...teammateIds.map(id => HEROES[id])].filter(h => h);
      
      const synergies = findSynergies(yourTeam);
      const antiSynergies = findAntiSynergies(yourTeam);
      
      displaySynergies(synergies, antiSynergies);
    }
    
    function findSynergies(team) {
      const synergies = [];
      
      // Known combo pairs
      const combos = {
        'yao': { partners: ['jing', 'augran', 'luna'], reason: 'Yao attaches for mobility + damage boost' },
        'guiguzi': { partners: ['houyi', 'luban', 'marcopolo'], reason: 'Guiguzi invisibility → Perfect setup for ADC' },
        'daji': { partners: ['gaochanggong', 'lanlingwang'], reason: 'Mage burst + Assassin cleanup combo' },
        'ming': { partners: ['luban', 'houyi'], reason: 'Ming shields enable aggressive positioning' },
        'donghuang': { partners: ['jing', 'gaochanggong'], reason: 'Ultimate lockdown → Easy assassin follow-up' },
        'athena': { partners: ['luban', 'marcopolo'], reason: 'Global ult to protect marksman' },
      };
      
      team.forEach((hero1, i) => {
        if (combos[hero1.id]) {
          team.forEach((hero2, j) => {
            if (i !== j && combos[hero1.id].partners.includes(hero2.id)) {
              synergies.push({
                heroes: [hero1, hero2],
                reason: combos[hero1.id].reason
              });
            }
          });
        }
      });
      
      // Role synergies
      const tanks = team.filter(h => h.role === 'Tank');
      const supports = team.filter(h => h.role === 'Support');
      const marksmen = team.filter(h => h.role === 'Marksman');
      const assassins = team.filter(h => h.role === 'Assassin');
      
      if (tanks.length >= 1 && marksmen.length >= 1) {
        synergies.push({
          type: 'role',
          reason: 'Tank frontline protects marksman → Standard comp structure'
        });
      }
      
      if (supports.length >= 1 && (marksmen.length >= 1 || assassins.length >= 1)) {
        synergies.push({
          type: 'role',
          reason: 'Support enables carries → Good peel and utility'
        });
      }
      
      if (assassins.length >= 1 && team.some(h => h.role === 'Mage')) {
        synergies.push({
          type: 'role',
          reason: 'Mage poke + Assassin dive → Poke then execute strategy'
        });
      }
      
      return synergies;
    }
    
    function findAntiSynergies(team) {
      const issues = [];
      
      // Count damage types
      const physical = team.filter(h => 
        h.role === 'Marksman' || h.role === 'Assassin' || h.role === 'Fighter'
      ).length;
      const magical = team.filter(h => h.role === 'Mage').length;
      
      if (physical >= 4 && magical === 0) {
        issues.push({
          type: 'damage',
          severity: 'high',
          problem: 'All physical damage (no magic)',
          solution: 'Enemy will stack armor. Very easy to itemize against you.'
        });
      } else if (physical >= 3 && magical <= 1) {
        issues.push({
          type: 'damage',
          severity: 'medium',
          problem: 'Too much physical damage (' + physical + ' heroes)',
          solution: 'Enemy can build armor. Consider adding magic damage.'
        });
      }
      
      if (magical >= 3 && physical <= 1) {
        issues.push({
          type: 'damage',
          severity: 'medium',
          problem: 'Too much magic damage',
          solution: 'Enemy will build magic resist. Need more physical threat.'
        });
      }
      
      // Multiple of same role
      const roles = {};
      team.forEach(h => roles[h.role] = (roles[h.role] || 0) + 1);
      
      if (roles.Marksman >= 3) {
        issues.push({
          type: 'composition',
          severity: 'high',
          problem: '3+ marksmen = Very weak early game',
          solution: 'All need farm. Will get run over early. Extremely risky.'
        });
      }
      
      if (roles.Assassin >= 3) {
        issues.push({
          type: 'composition',
          severity: 'medium',
          problem: '3+ assassins = Squishy, no frontline',
          solution: 'Hard to teamfight. Must snowball early or lose.'
        });
      }
      
      // No tank or support
      if (!roles.Tank && !roles.Support) {
        issues.push({
          type: 'composition',
          severity: 'medium',
          problem: 'No tank or support = Fragile team',
          solution: 'Hard to engage teamfights. Vulnerable to enemy engage.'
        });
      }
      
      return issues;
    }
    
    function displaySynergies(synergies, issues) {
      const container = document.getElementById('team-synergy-content');
      let html = '';
      
      // Show synergies
      if (synergies.length > 0) {
        html += '<div style="margin-bottom: 15px;"><strong style="color: #10b981;">💎 STRONG SYNERGIES:</strong>';
        synergies.forEach(syn => {
          html += '<div style="background: rgba(16,185,129,0.15); padding: 10px; margin: 8px 0; border-radius: 8px; border-left: 3px solid #10b981;">';
          if (syn.heroes) {
            html += '<div style="color: #e2e8f0; font-weight: 600;">';
            html += (syn.heroes[0].nameEn || syn.heroes[0].nameCn) + ' + ' + (syn.heroes[1].nameEn || syn.heroes[1].nameCn);
            html += '</div>';
          }
          html += '<div style="color: #94a3b8; font-size: 0.9rem; margin-top: 4px;">→ ' + syn.reason + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      
      // Show anti-synergies / issues
      if (issues.length > 0) {
        html += '<div><strong style="color: #ef4444;">⚠️ COMPOSITION ISSUES:</strong>';
        issues.forEach(issue => {
          const borderColor = issue.severity === 'high' ? '#ef4444' : '#f59e0b';
          html += '<div style="background: rgba(239,68,68,0.15); padding: 10px; margin: 8px 0; border-radius: 8px; border-left: 3px solid ' + borderColor + ';">';
          html += '<div style="color: #ef4444; font-weight: 600;">' + issue.problem + '</div>';
          html += '<div style="color: #e2e8f0; font-size: 0.9rem; margin-top: 4px;">→ ' + issue.solution + '</div>';
          html += '</div>';
        });
        html += '</div>';
      }
      
      if (synergies.length === 0 && issues.length === 0) {
        html = '<p style="color: #94a3b8;">Pick more teammates to see synergy analysis</p>';
      }
      
      container.innerHTML = html;
    }
